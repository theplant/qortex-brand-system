<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="qortex:requires-logo" content="true" />
  <title>Qortex customer-logo card 16:9</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Sora:wght@600;700;800&family=Noto+Sans+JP:wght@500;700&display=swap"
  />
  <link rel="stylesheet" href="../../system/tokens.css" />
  <style>
    /* 1200×630 — link-preview customer-announcement card. */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .card {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      padding: 64px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      column-gap: 64px;
      row-gap: 36px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
    }
    .orb-cyan {
      width: 540px;
      height: 540px;
      right: -180px;
      bottom: -200px;
      background: radial-gradient(circle at center, var(--cyan-bright) 0%, var(--cyan) 45%, transparent 70%);
      opacity: 0.85;
    }
    .orb-blue {
      width: 320px;
      height: 320px;
      left: -120px;
      top: -120px;
      background: radial-gradient(circle at center, var(--blue) 0%, transparent 70%);
      opacity: 0.55;
    }

    .wordmark {
      position: relative;
      grid-column: 1 / -1;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 26px;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .meta {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      max-width: 480px;
    }
    .eyebrow {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan-bright);
    }
    .name {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text);
    }

    .logo-surface {
      position: relative;
      align-self: center;
      justify-self: end;
      width: 460px;
      height: 240px;
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 40px;
      box-sizing: border-box;
    }
    .logo-surface img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    /* EN overrides */
    :lang(en) .name {
      font-size: 52px;
      line-height: 1.06;
      letter-spacing: -0.02em;
      word-break: normal;
      overflow-wrap: break-word;
    }

    /* JP overrides */
    :lang(ja) .name {
      font-family: var(--font-jp);
      font-weight: 700;
      font-size: 46px;
      line-height: 1.6;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    :lang(ja) .eyebrow {
      font-family: var(--font-jp);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb orb-blue"></div>
    <div class="orb orb-cyan"></div>

    <div class="wordmark">qortex</div>

    <div class="meta">
      <div class="eyebrow" id="eyebrow">Now serving</div>
      <div class="name" id="name">Acme Co</div>
    </div>

    <div class="logo-surface">
      <img id="customer-logo" alt="Customer logo" />
    </div>
  </div>
</body>
</html>
