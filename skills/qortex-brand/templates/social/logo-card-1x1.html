<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="qortex:requires-logo" content="true" />
  <title>QORTEX customer-logo card 1:1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Sora:wght@600;700;800&family=Noto+Sans+JP:wght@500;700&display=swap"
  />
  <link rel="stylesheet" href="../../system/tokens.css" />
  <style>
    /* 1080×1080 — square customer-announcement card.
       Customer logos are placed inside a white rounded surface so light and
       dark logos read consistently against the navy brand background. */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 1080px;
      height: 1080px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .card {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      padding: 96px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
    }
    .orb-cyan {
      width: 720px;
      height: 720px;
      right: -160px;
      bottom: -200px;
      background: radial-gradient(circle at center, var(--cyan-bright) 0%, var(--cyan) 45%, transparent 70%);
      opacity: 0.85;
    }
    .orb-blue {
      width: 480px;
      height: 480px;
      left: -120px;
      top: -120px;
      background: radial-gradient(circle at center, var(--blue) 0%, transparent 70%);
      opacity: 0.55;
    }

    .wordmark {
      position: relative;
      width: 160px;
      height: auto;
      color: var(--text);
    }
    .wordmark-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 200px;
      letter-spacing: -8px;
      fill: currentColor;
    }

    .stage {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 56px;
    }

    .logo-surface {
      width: 720px;
      height: 240px;
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 56px;
      box-sizing: border-box;
    }
    .logo-surface img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 880px;
    }
    .eyebrow {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan-bright);
    }
    .name {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text);
    }

    /* EN overrides */
    :lang(en) .name {
      font-size: 76px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      word-break: normal;
      overflow-wrap: break-word;
    }

    /* JP overrides */
    :lang(ja) .name {
      font-family: var(--font-jp);
      font-weight: 700;
      font-size: 68px;
      line-height: 1.6;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    :lang(ja) .eyebrow {
      font-family: var(--font-jp);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb orb-blue"></div>
    <div class="orb orb-cyan"></div>

    <svg class="wordmark" viewBox="0 0 1080 220" role="img" aria-label="QORTEX">
      <text class="wordmark-text" x="0" y="170">QORTEX</text>
    </svg>

    <div class="stage">
      <div class="logo-surface">
        <img id="customer-logo" alt="Customer logo" />
      </div>

      <div class="meta">
        <div class="eyebrow" id="eyebrow">Now serving</div>
        <div class="name" id="name">Acme Co</div>
      </div>
    </div>
  </div>
</body>
</html>
