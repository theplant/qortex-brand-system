<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>QORTEX quote card 9:16</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Sora:wght@600;700;800&family=Noto+Sans+JP:wght@500;700&display=swap"
  />
  <link rel="stylesheet" href="../../system/tokens.css" />
  <style>
    /* 1080×1920 — Instagram / LinkedIn story, vertical mobile. */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 1080px;
      height: 1920px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .card {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      padding: 96px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
    }
    .orb-cyan {
      width: 820px;
      height: 820px;
      right: -200px;
      top: -200px;
      background: radial-gradient(circle at center, var(--cyan-bright) 0%, var(--cyan) 45%, transparent 70%);
      opacity: 0.85;
    }
    .orb-blue {
      width: 620px;
      height: 620px;
      left: -180px;
      bottom: -180px;
      background: radial-gradient(circle at center, var(--blue) 0%, transparent 70%);
      opacity: 0.6;
    }

    .wordmark {
      position: relative;
      width: 180px;
      height: auto;
      color: var(--text);
    }
    .wordmark-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 200px;
      letter-spacing: -8px;
      fill: currentColor;
    }

    .quote {
      position: relative;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text);
      max-width: 880px;
    }

    .attribution {
      position: relative;
      font-family: var(--font-body);
      color: var(--text2);
      font-size: 28px;
      line-height: 1.4;
    }
    .attribution .name {
      color: var(--text);
      font-weight: 600;
    }
    .attribution .role {
      color: var(--text3);
      display: block;
      margin-top: 6px;
    }

    /* EN overrides */
    :lang(en) .quote {
      font-size: 104px;
      line-height: 1.04;
      letter-spacing: -0.02em;
      word-break: normal;
      overflow-wrap: break-word;
    }

    /* JP overrides — see channels/social.md */
    :lang(ja) .quote {
      font-family: var(--font-jp);
      font-weight: 700;
      font-size: 92px;
      line-height: 1.8;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    :lang(ja) .attribution {
      font-family: var(--font-jp);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb orb-blue"></div>
    <div class="orb orb-cyan"></div>

    <svg class="wordmark" viewBox="0 0 1080 220" role="img" aria-label="QORTEX">
      <text class="wordmark-text" x="0" y="170">QORTEX</text>
    </svg>

    <blockquote class="quote" id="quote">
      Japan-first. <em>Intelligent commerce.</em>
    </blockquote>

    <div class="attribution">
      <span class="name" id="name">QORTEX</span>
      <span class="role" id="role">qortex.com</span>
    </div>
  </div>
</body>
</html>
