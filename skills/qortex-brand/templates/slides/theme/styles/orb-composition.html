<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Orb composition</title>
  <link rel="stylesheet" href="../../../../system/tokens.css" />
  <style>
    /*
     * One-off page used by tools/generate-orb-composition.mjs to render
     * the frozen-frame orb composition that ships as a static PNG asset.
     * Not part of any slide build — slides reference the rendered PNG.
     */
    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background: var(--bg);
      overflow: hidden;
    }
    .stage { position: relative; width: 1920px; height: 1080px; }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(180px);
      pointer-events: none;
    }
    .orb-cyan {
      width: 1300px;
      height: 1300px;
      right: -260px;
      bottom: -300px;
      background: radial-gradient(circle at center, var(--cyan-bright) 0%, var(--cyan) 45%, transparent 70%);
      opacity: 0.85;
    }
    .orb-blue {
      width: 900px;
      height: 900px;
      left: -200px;
      top: -240px;
      background: radial-gradient(circle at center, var(--blue) 0%, transparent 70%);
      opacity: 0.55;
    }
    .orb-cyan-2 {
      width: 720px;
      height: 720px;
      left: 480px;
      top: 100px;
      background: radial-gradient(circle at center, var(--cyan) 0%, transparent 60%);
      opacity: 0.55;
    }
    /* Subtle grid overlay — survives in PNG as low-opacity static pattern. */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 80px 80px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-cyan-2"></div>
    <div class="orb orb-cyan"></div>
  </div>
</body>
</html>
